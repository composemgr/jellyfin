# nginx proxy address - http://172.17.0.1:8096

name: jellyfin
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    pull_policy: always
    container_name: jellyfin-app
    restart: always
    logging: *default-logging
    networks:
      - jellyfin
    ports:
      - "172.17.0.1:8096:8096"
    environment:
      TZ: ${TZ:-America/New_York}
      JELLYFIN_PublishedServerUrl: ${BASE_DOMAIN_NAME:-${BASE_HOST_NAME:-localhost}}
    volumes:
      - ./volumes/config/jellyfin:/config
      - ./volumes/data/jellyfin:/cache
      - ./volumes/data/media/movies:/media/movies:ro
      - ./volumes/data/media/tv:/media/tv:ro
      - ./volumes/data/media/music:/media/music:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  jellyfin:
    name: jellyfin
    external: false
